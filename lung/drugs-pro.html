<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#0d9488">
<title>健保肺癌藥物總整理（醫護版） — 彰濱秀傳癌症中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --teal:#0d9488; --teal2:#0f766e; --teal-d:#115e59;
  --teal-bg:rgba(13,148,136,.08); --teal-bdr:rgba(13,148,136,.22);
  --teal-soft:#e6f5f3;
  --bg:#F4F8F8; --card:#FFF; --bdr:#D8E5E4; --bdr2:#E8EFEE;
  --tx:#1e3a3a; --tx2:#5A6B6B; --tx3:#8A9595;
  --amber:#d97706; --amber-bg:#fef3c7;
  --self:#94703f; --self-bg:#fef9e7;
  --blue:#1d4ed8; --blue-bg:#dbeafe;
  --purple:#7c3aed; --purple-bg:#ede9fe;
  --green:#059669; --green-bg:#d1fae5;
  --red:#dc2626; --red-bg:#FEF2F2;
}
html,body{min-height:100%}
body{font-family:'Microsoft JhengHei','微軟正黑體',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.55}

/* Header */
.hdr{background:linear-gradient(135deg,#115e59 0%,#0f766e 50%,#0d9488 100%);color:#fff;padding:18px 18px 24px;text-align:left}
.hdr-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:12px}
.home-btn{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;color:#fff;text-decoration:none;flex-shrink:0;border:1px solid rgba(255,255,255,.22)}
.home-btn:hover{background:rgba(255,255,255,.26)}
.hdr-title{flex:1;min-width:0}
.hdr-title h1{font-size:18px;font-weight:900;letter-spacing:.5px}
.hdr-title p{font-size:11.5px;opacity:.78;margin-top:2px;letter-spacing:.5px}
@media(min-width:640px){
  .hdr-title h1{font-size:22px}
  .hdr-title p{font-size:13px}
}

/* Main */
.main{max-width:1100px;margin:-12px auto 0;padding:0 14px 40px;position:relative;z-index:2}

/* Filter bar */
.filterbar{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:10px;box-shadow:0 2px 10px rgba(15,118,110,.06);margin-bottom:14px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--bdr);border-radius:10px;padding:8px 12px;transition:border-color .2s}
.search-box:focus-within{border-color:var(--teal)}
.search-box svg{color:var(--tx3);flex-shrink:0}
.search-box input{flex:1;border:none;outline:none;background:transparent;font-size:14px;font-family:inherit;color:var(--tx)}
.search-box input::placeholder{color:var(--tx3)}
.search-box .clear-btn{background:transparent;border:none;cursor:pointer;color:var(--tx3);padding:2px;display:none}
.search-box .clear-btn.show{display:flex}

.chip-row{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:var(--card);border:1.5px solid var(--bdr);border-radius:99px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--tx2);cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.chip:hover{border-color:var(--teal);color:var(--teal)}
.chip.active{background:var(--teal);border-color:var(--teal);color:#fff}
.chip .ct{font-size:10.5px;opacity:.85}

/* Result count */
.result-count{font-size:11.5px;color:var(--tx3);padding:0 4px}
.result-count b{color:var(--teal-d);font-weight:800}

/* Drug grid */
.drugs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-top:12px}
@media(max-width:480px){
  .drugs-grid{grid-template-columns:1fr;gap:8px}
}

.drug{background:var(--card);border:1px solid var(--bdr);border-radius:13px;padding:13px;display:flex;flex-direction:column;gap:8px;transition:box-shadow .2s,border-color .2s}
.drug:hover{box-shadow:0 4px 14px rgba(15,118,110,.1);border-color:var(--teal-bdr)}

.drug-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.drug-names{flex:1;min-width:0}
.drug-en{font-size:15px;font-weight:900;color:var(--teal-d);letter-spacing:.2px;line-height:1.3;word-break:break-word}
.drug-zh{font-size:12.5px;color:var(--tx2);font-weight:700;margin-top:1px}
.drug-badges{display:flex;flex-direction:column;gap:3px;align-items:flex-end;flex-shrink:0}
.b{font-size:9.5px;font-weight:800;letter-spacing:.5px;padding:2px 7px;border-radius:5px;display:inline-block;line-height:1.3;white-space:nowrap}
.b-nhi{background:var(--teal);color:#fff}
.b-self{background:var(--self-bg);color:var(--self);border:1px solid #e6d3a7}
.b-target{background:var(--purple-bg);color:var(--purple);border:1px solid #d6cdf2}
.b-immuno{background:var(--blue-bg);color:var(--blue);border:1px solid #c8d6f9}
.b-chemo{background:var(--green-bg);color:var(--green);border:1px solid #b3e6d2}
.b-line{background:var(--bg);color:var(--tx2);border:1px solid var(--bdr);font-size:9px}

.drug-meta{font-size:11px;color:var(--tx3);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.drug-meta .lbl{font-weight:700;color:var(--tx2)}

.drug-indi{background:var(--teal-soft);border-left:3px solid var(--teal);border-radius:6px;padding:6px 9px;font-size:12px;color:var(--teal-d);font-weight:700;line-height:1.45}

.drug-rule{font-size:11.5px;color:var(--tx2);line-height:1.55;padding:6px 9px;background:#fff8eb;border-left:3px solid var(--amber);border-radius:6px}
.drug-rule:empty{display:none}

/* V2.9.5 醫護版進階欄位 */
.d-rows{display:flex;flex-direction:column;gap:3px;margin-top:2px}
.d-row{font-size:11px;color:var(--tx2);display:flex;gap:6px;align-items:flex-start;line-height:1.45}
.d-row .d-lbl{flex-shrink:0;font-weight:800;color:var(--tx);background:var(--bg);padding:1px 6px;border-radius:4px;font-size:10px;letter-spacing:.3px;min-width:60px;text-align:center}
.d-row .d-val{flex:1;min-width:0}
.d-row.d-prereq .d-lbl{background:#fef3c7;color:var(--amber)}
.d-appears{margin-top:4px;padding:6px 8px;background:var(--bg);border-radius:6px;border:1px dashed var(--bdr)}
.d-appears-h{font-size:10px;font-weight:800;color:var(--tx3);letter-spacing:.5px;margin-bottom:4px}
.d-stage{display:inline-block;font-size:10.5px;font-weight:600;color:var(--teal-d);background:var(--teal-soft);padding:2px 7px;border-radius:99px;margin:2px 3px 0 0;line-height:1.4}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--tx3)}
.empty svg{margin-bottom:10px}
.empty h3{font-size:14px;font-weight:700;color:var(--tx2);margin-bottom:4px}
.empty p{font-size:12px}

/* Footer note */
.foot{margin-top:24px;padding:14px 18px;background:var(--teal-bg);border-left:3px solid var(--teal);border-radius:8px;font-size:12px;color:var(--teal-d);line-height:1.65}
.foot strong{font-weight:800}

/* Disclaimer */
.disc{margin-top:10px;font-size:10.5px;color:var(--tx3);text-align:center;line-height:1.7}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-inner">
    <a href="../" class="home-btn" title="回首頁">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg>

    <div class="hdr-title">

      <p>依《健保第 9 章》與《附件 2 修訂對照表》彙整 · 2026/04 版</p>

</div>

<div class="main">

  <!-- Filter bar -->
  <div class="filterbar">
    <div class="search-box">

      <input id="q" placeholder="搜尋藥名（中文或英文）、適應症（如 EGFR、ALK、PD-L1）" oninput="onSearch()">
      <button class="clear-btn" id="clear-btn" onclick="clearSearch()" title="清除搜尋">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6M9 9l6 6"/></svg>
      </button>
    </div>

    <div class="chip-row" id="cat-chips">
      <button class="chip active" data-cat="ALL" onclick="setCat('ALL')">全部</button>

      <button class="chip" data-cat="CHEMO" onclick="setCat('CHEMO')">化療</button>

    <div class="chip-row" id="nhi-chips">

      <button class="chip" data-nhi="NHI" onclick="setNhi('NHI')">健保給付</button>
      <button class="chip" data-nhi="SELF" onclick="setNhi('SELF')">自費</button>
    </div>
    <div class="result-count" id="result-count"></div>
  </div>

  <div class="drugs-grid" id="grid"></div>

  <div class="foot">
    <strong>📋 使用說明</strong>　本表彙整自衛福部《全民健康保險藥物給付項目及支付標準》第 9 章「藥品給付規定」與《附件 2 修訂對照表》，
    為民眾教育用途。實際用藥須依主治醫師判斷與最新健保事審結果為準。
    健保事審條件可能隨健保署公告調整，使用前請與藥師或主治醫師確認。
  </div>

  <p class="disc">彰濱秀傳紀念醫院 癌症中心 · 不分線/不分組 = 健保條件不限定治療線；事審 = 需事前審查；ICI 9.69 = 第 9 章第 69 節免疫檢查點抑制劑規範</p>

</div>

/* ═══════════════════════════════════════════════════
   STATE & FILTERING
═══════════════════════════════════════════════════ */
let curCat = 'ALL';
let curNhi = 'ALL';
let curQ = '';

function getFiltered(){
  return ALL_DRUGS.filter(d=>{
    if(curCat !== 'ALL' && d.cat !== curCat) return false;
    if(curNhi !== 'ALL' && d.nhi !== curNhi) return false;
    if(curQ){
      const q = curQ.toLowerCase();
      const haystack = (d.en + ' ' + d.zh + ' ' + d.indi + ' ' + (d.rule||'')).toLowerCase();
      if(!haystack.includes(q)) return false;
    }
    return true;
  });
}

function render(){
  const items = getFiltered();
  const grid = document.getElementById('grid');
  const ct = document.getElementById('result-count');

  // Update chip counts (recompute from full set with current other filters)
  updateChipCounts();

  // Result count
  if(items.length === ALL_DRUGS.length){
    ct.innerHTML = `共 <b>${items.length}</b> 種藥物`;
  } else {
    ct.innerHTML = `符合篩選 <b>${items.length}</b> / ${ALL_DRUGS.length} 種`;
  }

  if(!items.length){
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <h3>找不到符合條件的藥物</h3>
      <p>請試試不同的搜尋字詞或調整篩選</p>
    </div>`;
    return;
  }

  grid.innerHTML = items.map(d=>{
    const catLabel = ({TARGET:'標靶',IMMUNO:'免疫',CHEMO:'化療',OTHER:'其他'})[d.cat] || d.cat;
    const catCls = ({TARGET:'b-target',IMMUNO:'b-immuno',CHEMO:'b-chemo',OTHER:'b-line'})[d.cat] || 'b-line';
    const nhiLabel = d.nhi === 'NHI' ? '健保' : '自費';
    const nhiCls = d.nhi === 'NHI' ? 'b-nhi' : 'b-self';

    // V2.9.5 醫護版進階欄位
    const nccnHtml = d.nccn ? `<div class="d-row"><span class="d-lbl">NCCN</span><span class="d-val">${esc(d.nccn)}</span></div>` : '';
    const nhiRefHtml = d.nhi_ref ? `<div class="d-row"><span class="d-lbl">健保條文</span><span class="d-val">${esc(d.nhi_ref)}</span></div>` : '';
    const prereqHtml = d.prereq ? `<div class="d-row d-prereq"><span class="d-lbl">必試/限制</span><span class="d-val">${esc(d.prereq)}</span></div>` : '';
    const appearsHtml = (d.appearsIn && d.appearsIn.length) ? `<div class="d-appears"><div class="d-appears-h">在以下情境會用到 (${d.appearsIn.length})</div>${d.appearsIn.map(s=>`<span class="d-stage">${esc(s)}</span>`).join('')}</div>` : '';

    return `<div class="drug" data-cat="${d.cat}" data-nhi="${d.nhi}">
      <div class="drug-head">
        <div class="drug-names">
          <div class="drug-en">${esc(d.en)}</div>
          <div class="drug-zh">${esc(d.zh)}</div>
        </div>
        <div class="drug-badges">
          <span class="b ${nhiCls}">${nhiLabel}</span>
          <span class="b ${catCls}">${catLabel}</span>
        </div>
      </div>
      <div class="drug-indi">${esc(d.indi)}</div>
      <div class="drug-meta">
        <span class="b b-line">${esc(d.line||'不分線')}</span>
      </div>
      <div class="d-rows">
        ${nccnHtml}
        ${nhiRefHtml}
        ${prereqHtml}
      </div>
      ${d.rule ? `<div class="drug-rule">${esc(d.rule)}</div>` : ''}
      ${appearsHtml}
    </div>`;
  }).join('');
}

function updateChipCounts(){
  // 計算每個 cat / nhi 篩選結果的數量
  const byCat = {ALL:ALL_DRUGS.length, TARGET:0, IMMUNO:0, CHEMO:0, OTHER:0};
  const byNhi = {ALL:ALL_DRUGS.length, NHI:0, SELF:0};
  for(const d of ALL_DRUGS){
    byCat[d.cat] = (byCat[d.cat]||0) + 1;
    byNhi[d.nhi] = (byNhi[d.nhi]||0) + 1;
  }
  document.querySelectorAll('#cat-chips .chip').forEach(c=>{
    const k = c.dataset.cat;
    const old = c.querySelector('.ct'); if(old) old.remove();
    if(byCat[k] !== undefined){
      const sp = document.createElement('span');
      sp.className = 'ct';
      sp.textContent = byCat[k];
      c.appendChild(sp);
    }
  });
  document.querySelectorAll('#nhi-chips .chip').forEach(c=>{
    const k = c.dataset.nhi;
    const old = c.querySelector('.ct'); if(old) old.remove();
    if(byNhi[k] !== undefined){
      const sp = document.createElement('span');
      sp.className = 'ct';
      sp.textContent = byNhi[k];
      c.appendChild(sp);
    }
  });
}

function setCat(cat){
  curCat = cat;
  document.querySelectorAll('#cat-chips .chip').forEach(c=>c.classList.toggle('active', c.dataset.cat===cat));
  render();
}
function setNhi(nhi){
  curNhi = nhi;
  document.querySelectorAll('#nhi-chips .chip').forEach(c=>c.classList.toggle('active', c.dataset.nhi===nhi));
  render();
}
function onSearch(){
  curQ = (document.getElementById('q').value||'').trim();
  document.getElementById('clear-btn').classList.toggle('show', !!curQ);
  render();
}
function clearSearch(){
  document.getElementById('q').value='';
  curQ='';
  document.getElementById('clear-btn').classList.remove('show');
  render();
}

function esc(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// init
render();
</script>
