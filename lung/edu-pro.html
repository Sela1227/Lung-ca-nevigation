<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>個人化照護導航手冊（醫護版） — 彰濱秀傳癌症中心</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#5B8FB9;--primary-dark:#4A7A9E;--primary-light:#EAF1F7;--rose:#e11d48;--text:#2C3E50;--text2:#5A6B7C;--text3:#8A9BAA;--surface:#fff;--surface2:#F1F4F8;--border:#E2E8F0}
body{font-family:'Microsoft JhengHei','微軟正黑體',system-ui,sans-serif;background:#F7F9FB;color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.edu-handout{max-width:800px;width:100%;border:2px solid var(--primary);border-radius:16px;overflow:hidden;background:#fff;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.edu-hdr{background:var(--primary);color:#fff;padding:20px 28px;text-align:center}
.edu-hdr h2{font-size:22px;font-weight:900;margin-bottom:4px}
.edu-hdr p{font-size:14px;opacity:.85}
.edu-body{padding:24px 28px}
.edu-info{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px;padding:14px 18px;background:var(--surface2);border-radius:10px;font-size:15px}
.edu-info b{color:var(--text)}
.edu-2col{display:grid;grid-template-columns:1fr 1fr;gap:28px}
.edu-sh{font-size:16px;font-weight:800;margin:0 0 8px;display:flex;align-items:center;gap:8px;color:var(--primary-dark);border-bottom:2px solid var(--border);padding-bottom:6px}
.edu-p{font-size:14px;line-height:1.8;color:var(--text);margin:0 0 16px}
.edu-note{font-size:12px;color:var(--text3);margin:0 0 16px}
.edu-team{width:100%;border-collapse:collapse;font-size:14px;margin-bottom:16px}
.edu-team td{padding:8px 12px;border-bottom:1px solid #e5e7eb}
.edu-team td:first-child{font-weight:600;white-space:nowrap}
.edu-emg{background:#fef2f2;border:2px solid var(--rose);border-radius:10px;padding:12px 16px;font-size:13px;color:#991b1b;line-height:1.6;margin-top:12px}
.drug-list{display:flex;flex-direction:column;gap:8px;margin:0 0 12px}
.drug-item{background:var(--surface2);border-left:3px solid var(--primary);border-radius:8px;padding:8px 12px}
.drug-title{font-size:13.5px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;margin-bottom:3px}
.drug-n{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--primary);color:#fff;font-size:11px;font-weight:800;flex-shrink:0}
.drug-d{font-size:13px;color:var(--primary-dark);font-weight:700;line-height:1.5;margin-left:28px}
.drug-note{font-size:11.5px;color:var(--text2);line-height:1.5;margin-left:28px;margin-top:3px;font-style:italic}
.edu-footer{margin-top:20px;padding:14px 18px;background:var(--surface2);border-radius:10px;font-size:13px;color:var(--text3);text-align:center}
.edu-error{max-width:480px;text-align:center;padding:60px 30px;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.edu-error i{font-size:48px;color:var(--text3);margin-bottom:16px;display:block}
.edu-error h3{font-size:20px;font-weight:800;margin-bottom:8px}
.edu-error p{font-size:14px;color:var(--text2);line-height:1.7}
.page-footer{margin-top:20px;font-size:11px;color:var(--text3);text-align:center;line-height:1.6}
@media(max-width:640px){
  body{padding:10px}
  .edu-info{grid-template-columns:1fr 1fr;font-size:13px;padding:10px 14px}
  .edu-2col{grid-template-columns:1fr;gap:16px}
  .edu-sh{font-size:14px}.edu-p{font-size:13px}
  .edu-team{font-size:13px}.edu-team td{padding:6px 10px}
  .edu-emg{font-size:12px;padding:10px 14px}
}
@media print{
  body{background:#fff;padding:0}
  .edu-handout{border:2px solid #000;border-radius:0;box-shadow:none;max-width:100%;min-height:95vh}
  .edu-hdr{background:#333!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color:#fff!important;padding:20px 30px}
  .edu-hdr h2{font-size:24px}
  .edu-body{padding:24px 30px}
  .edu-info{grid-template-columns:1fr 1fr 1fr!important;font-size:15px;background:#f9fafb!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;border:1px solid #e5e7eb}
  .edu-2col{grid-template-columns:1fr 1fr!important;gap:28px}
  .edu-sh{font-size:16px;border-bottom:2px solid #e5e7eb}
  .edu-p{font-size:14px;line-height:1.8}
  .edu-emg{background:#fff5f5!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;border:2px solid #666}
  .page-footer{display:none}
}
</style>
</head>
<body>
<div id="app"></div>
<div class="page-footer" id="page-footer"></div>
<script>
(function(){
  const app = document.getElementById('app');
  const footer = document.getElementById('page-footer');

  // ── 查表資料：從 type code + stage 還原完整內容 ──
  const TYPE_NAME = {NS:'非鱗狀非小細胞肺癌 (NSCLC)',SQ:'鱗狀非小細胞肺癌 (NSCLC)',SC:'小細胞肺癌 (SCLC)'};
  const TEAM = [
    {dept:'胸腔外科'},
    {dept:'胸腔內科／血液腫瘤科'},
    {dept:'放射腫瘤科'}
  ];
  // 治療目標查表（簡化版，依 type + stage 粗分）
  function getGoal(t,s,b){
    if(t==='SC'){
      const isExt = (s==='Extensive' || s.startsWith('IV'));
      if(isExt){
        if(b==='yes') return '有腦/脊髓轉移：化療為主控制全身病灶，並先放療處理腦部症狀。';
        if(b==='no')  return '化療＋免疫治療達快速緩解，維持控制（無腦/脊髓轉移者免疫適用）。';
        return '化療為基礎，是否加免疫須先確認腦/脊髓影像。';
      }
      // Limited
      return '利用化療高敏感度達成快速緩解，同步放療加強局部控制。';
    }
    if(s.startsWith('IV')) return '依基因檢測結果精準選擇標靶、免疫或化療。';
    if(s.startsWith('III')) return '多模態策略：化放療 ± 手術 ± 免疫鞏固。';
    return '以治癒為目標，手術清除病灶，輔以化療降低復發。';
  }
  function getTx(t,s,m,b){
    if(t==='SC'){
      const isExt = (s==='Extensive' || s.startsWith('IV'));
      if(isExt){
        if(b==='yes') return '化療（鉑類＋Etoposide）+ 腦放療控制病灶（免疫不適用）';
        if(b==='no')  return '化療 + 免疫治療（Atezolizumab/Durvalumab，健保事審）';
        return '化療為基礎，依腦/脊髓影像決定是否加免疫';
      }
      // Limited
      if(b==='yes') return '同步化放療 + 腦轉移治療性放療（不再做 PCI）';
      if(b==='no')  return '同步化放療 + CR/PR 後預防性全腦照射 (PCI)';
      return '同步化放療，PCI 評估前先確認腦部影像';
    }
    if(s.startsWith('IV')){
      if(m==='EGFR') return 'EGFR 標靶藥物';
      if(m==='ALK') return 'ALK 標靶藥物';
      if(m==='ROS1') return 'ROS1 標靶藥物';
      if(m==='BRAF') return 'BRAF + MEK 標靶藥物';
      if(m==='MET') return 'MET 標靶藥物';
      if(m==='KRAS') return 'KRAS G12C 標靶藥物（自費）';
      if(m==='OTHER_TKI') return '對應標靶藥物';
      if(m==='PDL1_HIGH'||m==='PDL1_LOW'||m==='PDL1_NEG') return '免疫治療 ± 化療（依健保規範）';
      return '依基因檢測結果決定';
    }
    if(s.startsWith('III')) return '化放療 ± 手術 ± 免疫/標靶治療';
    return '手術切除 → 依病理分期決定輔助治療';
  }

  // 顯示分期：SCLC 用「侷限型/擴散型」
  function stageLabel(t, s){
    if(t==='SC'){
      if(s==='Limited' || s.startsWith('III') || s.startsWith('II') || s.startsWith('I')) return '侷限型 (Limited)';
      if(s==='Extensive' || s.startsWith('IV')) return '擴散型 (Extensive)';
      return s || '—';
    }
    return 'Stage ' + (s||'—');
  }

  // ── 詳細藥物清單（醫護版用，給快速查閱）──
  function getDrugDetail(t, s, m, b){
    const items = [];
    if(t==='SC'){
      const isExt = (s==='Extensive' || s.startsWith('IV'));
      if(isExt){
        if(b==='yes'){
          items.push({title:'第一線：化療（不可加免疫）', drugs:'Cisplatin/Carboplatin + Etoposide', note:'健保 ICI 9.69 限「無腦/脊髓轉移」者才能加免疫'});
          items.push({title:'腦病灶處理', drugs:'WBRT 或伽瑪刀 + 同步/序貫化療', note:'有症狀腦轉移：先放療控制症狀'});
        } else if(b==='no'){
          items.push({title:'第一線：化療 + 免疫', drugs:'Atezolizumab + Carboplatin + Etoposide / Durvalumab + Etoposide + 鉑類', note:'健保事審，PD-L1 不限'});
        } else {
          items.push({title:'第一線：化療 ± 免疫', drugs:'Cisplatin/Carboplatin + Etoposide', note:'先排除腦/脊髓轉移再決定是否加免疫'});
        }
        items.push({title:'PCI', drugs: b==='yes' ? '已轉移者改治療性放療（不做 PCI）' : 'CR/PR 後可考慮（25-30 Gy）'});
        items.push({title:'二線', drugs:'Topotecan', note:'第一線含鉑後復發'});
        return items;
      }
      // Limited
      items.push({title:'同步化放療 (CCRT)', drugs:'Cisplatin + Etoposide + 胸部放療 60-66 Gy', note:'年齡 ≥70 或 PS≥2 可調序貫'});
      items.push({title:'極早期', drugs:'T1-2 N0 可先手術切除 + 術後化療'});
      if(b==='yes'){
        items.push({title:'PCI', drugs:'已轉移者不再做 PCI，改治療性放療'});
      } else if(b==='no'){
        items.push({title:'PCI', drugs:'CR/PR 後 25-30 Gy', note:'顯著降低腦轉移風險'});
      } else {
        items.push({title:'PCI', drugs:'CR/PR 後評估，先確認腦部 MRI'});
      }
      return items;
    }
    // NSCLC
    if(s.startsWith('IV')){
      if(m==='EGFR'){
        items.push({title:'第一線標靶', drugs:'Osimertinib / Gefitinib / Erlotinib / Afatinib / Dacomitinib', note:'五擇一不互換；Dacomitinib 限無腦轉移'});
        items.push({title:'L858R + 腦轉移', drugs:'Erlotinib + Bevacizumab', note:'事審'});
        items.push({title:'惡化後', drugs:'T790M 檢測 → Osimertinib 二線'});
      } else if(m==='ALK'){
        items.push({title:'第一線標靶', drugs:'Alectinib / Lorlatinib / Ceritinib / Brigatinib / Crizotinib', note:'五擇一'});
      } else if(m==='ROS1'){
        items.push({title:'第一線標靶', drugs:'Crizotinib / Entrectinib', note:'擇一'});
      } else if(m==='BRAF'){
        items.push({title:'第一線', drugs:'含鉑化療（Pemetrexed + 鉑類）'});
        items.push({title:'第二線（含鉑後）', drugs:'Dabrafenib + Trametinib', note:'限 BRAF V600E'});
      } else if(m==='MET'){
        items.push({title:'標靶', drugs:'Tepotinib', note:'限 MET exon 14 skipping'});
      } else if(m==='KRAS'){
        items.push({title:'第一線', drugs:'含鉑化療 + 免疫'});
        items.push({title:'第二線', drugs:'Sotorasib（自費，KRAS G12C）'});
      } else if(m==='PDL1_HIGH'){
        items.push({title:'第一線（IO+化療）', drugs:'Pembrolizumab + Pemetrexed + 鉑類 / Atezolizumab + Bevacizumab + Carboplatin + Paclitaxel', note:'PD-L1 ≥50% 健保事審'});
      } else if(m==='PDL1_LOW'){
        items.push({title:'第一線（化療±IO）', drugs:'Pemetrexed + Carboplatin/Cisplatin ± Pembrolizumab', note:'PD-L1 1-49% 加免疫須符合 ICI 9.69'});
      } else {
        items.push({title:'建議', drugs:'先做 NGS（EGFR/ALK/ROS1/BRAF/MET/KRAS/NTRK）+ PD-L1，依結果個人化'});
        items.push({title:'等報告期間', drugs:'可先含鉑化療'});
      }
      return items;
    }
    if(s.startsWith('III')){
      items.push({title:'同步化放療 (CCRT)', drugs:'Cisplatin + Etoposide + 胸部放療 / Carboplatin + Paclitaxel + RT', note:'每次 2 Gy 總劑量 60-66 Gy'});
      items.push({title:'CCRT 後鞏固', drugs:'Durvalumab', note:'PD-L1 ≥1%，至多 12 個月（PACIFIC）'});
      items.push({title:'部分病人', drugs:'可先手術 + 術後輔助治療'});
      return items;
    }
    // Early
    items.push({title:'手術根除', drugs:'肺葉切除 + 縱膈淋巴結廓清術', note:'NSCLC 早期首選'});
    items.push({title:'不適合手術', drugs:'SBRT（限 T1-2 N0）'});
    items.push({title:'術後輔助化療（II 期或高風險 IB）', drugs:'Cisplatin + Vinorelbine / Cisplatin + Pemetrexed', note:'4 個療程；高齡可改 Carboplatin'});
    if(t==='NS'){
      items.push({title:'EGFR(+) 鞏固', drugs:'Osimertinib', note:'IB-IIIA 術後至多 3 年（ADAURA）'});
    }
    return items;
  }

  // Parse fragment
  const frag = location.hash.substring(1);
  if(!frag){ showError('找不到資料','此連結不包含照護資訊，請重新掃描 QR code。'); return; }

  let d;
  try {
    const json = decodeURIComponent(escape(atob(frag)));
    d = JSON.parse(json);
  } catch(e){ showError('資料解析失敗','QR code 內容無法解讀，請確認連結完整。'); return; }

  if(!d.t || !d.s){ showError('資料不完整','缺少診斷或分期資訊。'); return; }

  render(d);

  function render(d){
    const typeName = TYPE_NAME[d.t]||d.t;
    const goal = getGoal(d.t, d.s, d.b);
    const tx = getTx(d.t, d.s, d.m, d.b);
    const stageTxt = stageLabel(d.t, d.s);
    const drugDetail = getDrugDetail(d.t, d.s, d.m, d.b);

    let h = '<div class="edu-handout">';
    h += '<div class="edu-hdr"><h2><i class="fa-solid fa-book-medical"></i> 個人化照護導航手冊 — 醫護版</h2><p>彰濱秀傳癌症中心多專科團隊</p></div>';
    h += '<div class="edu-body">';
    h += '<div class="edu-info">';
    h += `<div><b>姓名：</b>${d.n||'—'}</div>`;
    h += `<div><b>診斷：</b>${typeName}</div>`;
    h += `<div><b>分期：</b>${stageTxt}</div>`;
    h += '</div>';
    // SCLC + brainMet 特別行
    if(d.t==='SC' && d.b){
      const bL = ({yes:'有腦/脊髓轉移', no:'無腦/脊髓轉移', unknown:'腦/脊髓轉移待確認'})[d.b] || '';
      const bColor = d.b==='yes' ? '#b91c1c' : (d.b==='no' ? '#15803d' : '#a16207');
      if(bL) h += `<div style="margin-bottom:14px;padding:8px 14px;background:#f9fafb;border-left:3px solid ${bColor};font-size:13px;color:${bColor};font-weight:700">${bL}（影響預防性全腦照射 PCI 與免疫治療使用）</div>`;
    }
    h += '<div class="edu-2col">';
    // Left: team + emergency
    h += '<div class="edu-col">';
    h += '<h4 class="edu-sh"><i class="fa-solid fa-user-doctor"></i> 您的照護團隊</h4>';
    h += '<table class="edu-team">';
    TEAM.forEach((t,i)=>{
      const doc = d.tm && d.tm[i] ? d.tm[i] : '';
      const style = doc ? 'font-weight:700;color:#166534' : 'color:#999;font-style:italic';
      h += `<tr><td>${t.dept}</td><td style="${style}">${doc ? doc+' 醫師' : '（待安排）'}</td></tr>`;
    });
    if(d.c) h += `<tr style="background:#f0fdfa"><td>個案管理師</td><td style="font-weight:700;color:#0891b2">${d.c}</td></tr>`;
    h += '</table>';
    h += '<div class="edu-emg"><b><i class="fa-solid fa-circle-exclamation" style="margin-right:4px"></i> 緊急回診：</b>發燒＞38.5°C、劇烈胸痛、呼吸困難、咳血、嚴重皮疹/腹瀉/黃疸</div>';
    h += '</div>';
    // Right: treatment
    h += '<div class="edu-col">';
    h += `<h4 class="edu-sh"><i class="fa-solid fa-bullseye"></i> 治療目標</h4><p class="edu-p">${goal}</p>`;
    h += `<h4 class="edu-sh"><i class="fa-solid fa-flask"></i> 建議治療方案</h4><p class="edu-p">${tx}</p>`;
    // Drug detail (醫護版重點：完整藥名 + 規範)
    h += '<h4 class="edu-sh"><i class="fa-solid fa-prescription-bottle-medical"></i> 藥物與規範</h4>';
    h += '<div class="drug-list">';
    drugDetail.forEach((it,i)=>{
      h += `<div class="drug-item"><div class="drug-title"><span class="drug-n">${i+1}</span>${it.title}</div>`;
      if(it.drugs) h += `<div class="drug-d">${it.drugs}</div>`;
      if(it.note)  h += `<div class="drug-note">${it.note}</div>`;
      h += '</div>';
    });
    h += '</div>';
    h += '<p class="edu-note">＊依本院診療指引與健保第 9 章彙整，實際處方由主治醫師依病人狀況決定。</p>';
    h += '</div></div>';
    h += `<div class="edu-footer">本頁為醫護內部快速查閱用。如有疑問請聯繫個案管理師${d.c?'（'+d.c+'）':''}。</div>`;
    h += '</div></div>';
    app.innerHTML = h;
    footer.innerHTML = `產生日期：${d.d||'—'}<br>此頁面為醫護快速查閱版本（病人版本請改用 edu-patient.html）。<br>彰濱秀傳紀念醫院 癌症中心`;
  }

  function showError(title, msg){
    app.innerHTML = `<div class="edu-error"><i class="fa-solid fa-circle-exclamation"></i><h3>${title}</h3><p>${msg}</p></div>`;
    footer.innerHTML = '彰濱秀傳紀念醫院 癌症中心';
  }
})();
</script>
</body>
</html>
