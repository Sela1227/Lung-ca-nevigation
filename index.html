<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>彰濱秀傳癌症中心 — 癌症臨床路徑</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#0d9b6a;--primary-dark:#087a54;--primary-light:#e8f7f1;
  --bg:#f0f4f2;--surface:#fff;--border:#dce5df;
  --text:#1a2e23;--text2:#4a6355;--text3:#8a9f93;
  --radius:16px;
}
body{
  font-family:'Noto Sans TC',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;
}

/* ── Header ── */
.header{
  background:linear-gradient(135deg,#0a3d2e 0%,#0d9b6a 60%,#34d399 100%);
  color:#fff;padding:48px 24px 56px;text-align:center;position:relative;overflow:hidden;
}
.header::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 20% 80%,rgba(255,255,255,.08) 0%,transparent 50%),
             radial-gradient(circle at 80% 20%,rgba(255,255,255,.05) 0%,transparent 40%);
}
.header-inner{position:relative;z-index:1;max-width:800px;margin:0 auto}
.logo-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px}
.logo-icon{width:56px;height:56px;background:rgba(255,255,255,.15);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2)}
.hospital-name{font-size:28px;font-weight:900;letter-spacing:1px;text-shadow:0 2px 8px rgba(0,0,0,.15)}
.subtitle{font-size:15px;opacity:.85;font-weight:400;margin-top:4px;letter-spacing:.5px}

/* ── Main ── */
.main{flex:1;max-width:960px;width:100%;margin:-32px auto 0;padding:0 20px 40px;position:relative;z-index:2}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}

/* ── Card ── */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:28px 20px 24px;text-align:center;position:relative;overflow:hidden;
  transition:transform .2s,box-shadow .2s,border-color .2s;
}
.card.active{cursor:pointer}
.card.active:hover{
  transform:translateY(-4px);box-shadow:0 8px 32px rgba(13,155,106,.15);
  border-color:var(--primary);
}
.card.wip{opacity:.55;cursor:default}
.card-icon{
  width:64px;height:64px;border-radius:18px;margin:0 auto 16px;
  display:flex;align-items:center;justify-content:center;font-size:28px;
  transition:transform .2s;
}
.card.active:hover .card-icon{transform:scale(1.08)}
.card-title{font-size:18px;font-weight:800;margin-bottom:4px}
.card-sub{font-size:12px;color:var(--text3);line-height:1.5}
.card-badge{
  display:inline-flex;align-items:center;gap:4px;
  margin-top:12px;padding:4px 12px;border-radius:99px;
  font-size:11px;font-weight:700;letter-spacing:.3px;
}
.badge-active{background:var(--primary-light);color:var(--primary-dark);border:1px solid #a7f3d0}
.badge-wip{background:#f5f5f5;color:#aaa;border:1px solid #e5e5e5}

/* ── Footer ── */
.footer{
  text-align:center;padding:24px 20px;font-size:12px;color:var(--text3);
  border-top:1px solid var(--border);background:var(--surface);line-height:1.8;
}

/* ── Responsive ── */
@media(max-width:640px){
  .header{padding:32px 16px 44px}
  .hospital-name{font-size:22px}
  .logo-icon{width:44px;height:44px;font-size:22px;border-radius:12px}
  .main{margin-top:-24px;padding:0 12px 32px}
  .grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .card{padding:20px 14px 18px}
  .card-icon{width:52px;height:52px;border-radius:14px;font-size:24px;margin-bottom:12px}
  .card-title{font-size:15px}
  .card-sub{font-size:11px}
  .card-badge{font-size:10px;padding:3px 10px;margin-top:8px}
}
@media(max-width:380px){
  .grid{grid-template-columns:1fr 1fr;gap:10px}
  .card{padding:16px 10px 14px}
  .card-icon{width:44px;height:44px;font-size:20px}
  .card-title{font-size:14px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo-row">
      <div class="logo-icon"><i class="fa-solid fa-hospital"></i></div>
      <div>
        <div class="hospital-name">彰濱秀傳癌症中心</div>
        <div class="subtitle">癌症臨床路徑導航系統</div>
      </div>
    </div>
  </div>
</div>

<div class="main">
  <div class="grid" id="grid"></div>
</div>

<div class="footer">
  彰濱秀傳紀念醫院 癌症中心<br>
  臨床路徑導航系統 — 僅供院內臨床人員使用
</div>

<script>
const CANCERS = [
  {id:'lung',  name:'肺癌',     icon:'fa-solid fa-lungs',         bg:'#e8f7f1',fg:'#0d9b6a', url:'lung/', active:true},
  {id:'breast',name:'乳癌',     icon:'fa-solid fa-ribbon',        bg:'#fce7f3',fg:'#db2777', url:'breast/'},
  {id:'crc',   name:'大腸直腸癌',icon:'fa-solid fa-bacteria',     bg:'#fef3c7',fg:'#d97706', url:'crc/'},
  {id:'esoph', name:'食道癌',    icon:'fa-solid fa-utensils',      bg:'#fee2e2',fg:'#dc2626', url:'esoph/'},
  {id:'hn',    name:'頭頸癌',    icon:'fa-solid fa-head-side-mask',bg:'#e0e7ff',fg:'#4f46e5', url:'hn/'},
  {id:'liver', name:'肝癌',      icon:'fa-solid fa-shield-virus',  bg:'#fef9c3',fg:'#a16207', url:'liver/'},
  {id:'prost', name:'攝護腺癌',  icon:'fa-solid fa-mars',          bg:'#dbeafe',fg:'#2563eb', url:'prost/'},
  {id:'bladder',name:'膀胱癌',   icon:'fa-solid fa-droplet',       bg:'#f0fdfa',fg:'#0891b2', url:'bladder/'},
];

const grid = document.getElementById('grid');
CANCERS.forEach(c=>{
  const isActive = c.active;
  const card = document.createElement('div');
  card.className = `card ${isActive?'active':'wip'}`;
  if(isActive) card.onclick = ()=> location.href = c.url;
  card.innerHTML = `
    <div class="card-icon" style="background:${c.bg};color:${c.fg}">
      <i class="${c.icon}"></i>
    </div>
    <div class="card-title">${c.name}</div>
    <div class="card-sub">${isActive?'臨床路徑導航':'即將上線'}</div>
    <div class="card-badge ${isActive?'badge-active':'badge-wip'}">
      <i class="fa-solid ${isActive?'fa-circle-check':'fa-hammer'}" style="font-size:10px"></i>
      ${isActive?'可使用':'建構中'}
    </div>
  `;
  grid.appendChild(card);
});
</script>
</body>
</html>
